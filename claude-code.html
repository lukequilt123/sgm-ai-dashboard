<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SGM AI Dashboard — Claude Code</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%2326153A'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='white'>S</text></svg>">
</head>
<body>

  <!-- Background Effects -->
  <div class="orb-container">
    <div class="orb orb--1"></div>
    <div class="orb orb--2"></div>
  </div>
  <div class="grain-overlay"></div>

  <div class="portal-page">

    <!-- Navigation -->
    <nav class="portal-nav">
      <a href="home.html">
        <img
          src="https://cdn.brandfetch.io/id6AGii4MS/w/396/h/126/theme/dark/logo.png?c=1bxid64Mup7aczewSAYMX&t=1740480772206"
          alt="Sleeping Giant Media"
          class="portal-nav__logo"
        >
      </a>
      <button class="portal-nav__hamburger" onclick="document.querySelector('.portal-nav__links').classList.toggle('portal-nav__links--open')" aria-label="Toggle menu">&#9776;</button>
      <ul class="portal-nav__links">
        <li><a href="home.html" class="portal-nav__link">Home</a></li>
        <li><a href="tools.html" class="portal-nav__link">AI Tools</a></li>
        <li><a href="prompts.html" class="portal-nav__link">Prompts</a></li>
        <li><a href="claude-code.html" class="portal-nav__link">Claude Code</a></li>
      </ul>
    </nav>

    <!-- Content -->
    <main class="page-content">
      <div class="section-label">Claude Code</div>
      <h1 class="page-title">Claude Code Resources</h1>
      <p class="page-subtitle">Guides, workflows, and assets for Claude Code at SGM</p>

      <!-- Filter Bar -->
      <div class="filter-bar glass-card">
        <div class="filter-bar__search">
          <svg class="filter-bar__search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="claude-search" class="filter-control filter-bar__search-input"
                 placeholder="Search Claude resources..." aria-label="Search Claude resources">
        </div>

        <div class="filter-bar__dropdowns">
          <select id="filter-itemtype" class="filter-control filter-bar__select" aria-label="Filter by Item Type">
            <option value="">All Types</option>
          </select>
        </div>

        <div class="filter-bar__count" id="claude-count"></div>
      </div>

      <!-- Claude Cards Grid -->
      <div class="tool-grid" id="claude-grid"></div>

      <!-- Empty State -->
      <div class="tool-grid__empty hidden" id="claude-empty">
        <div class="tool-grid__empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            <line x1="8" y1="11" x2="14" y2="11"></line>
          </svg>
        </div>
        <p class="tool-grid__empty-title">No items found</p>
        <p class="tool-grid__empty-text">Try adjusting your search or filters</p>
        <button class="btn-outline" onclick="ClaudePage.clearFilters()">Clear All Filters</button>
      </div>
    </main>

  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
